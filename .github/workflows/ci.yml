name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format

      - name: cppcheck
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --quiet \
            src/**/*.c

      - name: clang-format check
        run: |
          find src -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

  build:
    name: Build (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config ${{ matrix.cc }} \
            libsystemd-dev libcairo2-dev libpango1.0-dev \
            libwlroots-dev wayland-protocols libxkbcommon-dev \
            libostree-dev libflatpak-dev libapparmor-dev \
            libcmocka-dev

      - name: Cache subprojects
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}
          restore-keys: subprojects-

      - name: Setup
        env:
          CC: ${{ matrix.cc }}
        run: meson setup builddir -Denable_tests=true

      - name: Compile
        run: meson compile -C builddir

      - name: Cache builddir
        uses: actions/cache@v4
        with:
          path: builddir
          key: builddir-${{ matrix.cc }}-${{ github.sha }}

  test:
    name: Test (${{ matrix.cc }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config ${{ matrix.cc }} \
            libsystemd-dev libcairo2-dev libpango1.0-dev \
            libwlroots-dev wayland-protocols libxkbcommon-dev \
            libostree-dev libflatpak-dev libapparmor-dev \
            libcmocka-dev

      - name: Restore builddir
        uses: actions/cache@v4
        with:
          path: builddir
          key: builddir-${{ matrix.cc }}-${{ github.sha }}

      - name: Restore subprojects
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}
          restore-keys: subprojects-

      - name: Test
        run: meson test -C builddir --verbose
