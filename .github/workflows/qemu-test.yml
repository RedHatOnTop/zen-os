name: QEMU Boot Test

on:
  push:
    paths:
      - 'compositor/**'
      - 'shell/**'
      - 'daemons/**'
      - 'common/**'
      - 'tools/zen-test-cli/**'
  pull_request:
    paths:
      - 'compositor/**'
      - 'shell/**'
      - 'daemons/**'
      - 'common/**'

jobs:
  build-and-boot-test:
    name: Build + QEMU Boot Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build gcc pkg-config \
            libwlroots-dev libsystemd-dev \
            libcairo2-dev libpango1.0-dev \
            wayland-protocols libxkbcommon-dev \
            qemu-system-x86 qemu-utils \
            socat jq \
            debootstrap

      # TODO: Uncomment when compositor source exists
