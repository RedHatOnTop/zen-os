name: QEMU Integration Tests

on:
  push:
    paths:
      - 'src/**'
      - 'tools/zen-test/**'
      - 'tools/image-builder/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tools/zen-test/**'
      - 'tools/image-builder/**'

jobs:
  qemu-test:
    name: Build + QEMU Quality Gate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build gcc pkg-config \
            libwlroots-dev libsystemd-dev \
            libcairo2-dev libpango1.0-dev \
            wayland-protocols libxkbcommon-dev \
            qemu-system-x86 qemu-utils \
            debootstrap jq

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache zen-test binary
        uses: actions/cache@v4
        with:
          path: tools/zen-test/target/release/zen-test
          key: zen-test-${{ hashFiles('tools/zen-test/**/*.rs', 'tools/zen-test/Cargo.*') }}

      - name: Build zen-test
        run: cargo build --release --manifest-path tools/zen-test/Cargo.toml

      - name: Build compositor (ASan + UBSan)
        run: |
          meson setup builddir -Db_sanitize=address,undefined
          meson compile -C builddir

      - name: Build test image
        run: |
          sudo bash tools/image-builder/build-test-image.sh \
            --compositor builddir/src/compositor/zen-compositor \
            --builddir builddir \
            --output /tmp/zen-os-test.qcow2

      - name: Run quality gates (Phase 1)
        run: |
          tools/zen-test/target/release/zen-test gate run \
            --phase 1 \
            --image /tmp/zen-os-test.qcow2 \
            --gate-dir tools/zen-test/gates \
            --tap /tmp/zen-test-results.tap \
            --timeout 600 \
            2>/tmp/zen-test-stderr.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-test-results
          path: |
            /tmp/zen-test-results.tap
            /tmp/zen-test-stderr.log
            /tmp/zen-test-vms/*/serial.log
            /tmp/zen-test-vms/*/screenshots/

      - name: Cleanup VMs
        if: always()
        run: |
          for vm in /tmp/zen-test-vms/*/; do
            name=$(basename "$vm")
            tools/zen-test/target/release/zen-test vm destroy "$name" --timeout 10 2>/dev/null || true
          done
