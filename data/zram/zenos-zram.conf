# Zen OS zram swap configuration
# Enables compressed in-memory swap to extend effective memory
# on low-end hardware without requiring a swap partition.

# Compression algorithm (lz4 for speed, zstd for ratio)
ALGORITHM=lz4

# Size as percentage of physical RAM
SIZE=50

# Number of zram streams (auto = number of CPU cores)
STREAMS=auto

# Priority relative to other swap devices
PRIORITY=100
