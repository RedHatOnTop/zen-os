[gate]
name = "Sub-Phase 1.12: Screen Lock"
phase = "1"
sub_phase = "1.12"
description = "Screen lock activates and covers all outputs"
tags = ["lock", "session", "pam"]
timeout_seconds = 240

[vm]
ram_mb = 2048
cpus = 2

[[assert.serial]]
pattern = "ZEN_BOOT_OK"
description = "Compositor boots"

[[assert.exec]]
command = "pgrep zen-compositor"
exit_code = 0
description = "Compositor is running"
timeout_seconds = 5

[[assert.serial_absent]]
pattern = "ERROR: AddressSanitizer"
description = "No ASan errors"

[[assert.serial_absent]]
pattern = "segfault"
description = "No segfaults"
