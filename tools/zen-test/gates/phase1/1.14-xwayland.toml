[gate]
name = "Sub-Phase 1.14: XWayland Bridge"
phase = "1"
sub_phase = "1.14"
description = "X11 applications launch and display inside the compositor via XWayland"
tags = ["xwayland", "x11", "bridge"]
timeout_seconds = 240

[vm]
ram_mb = 2048
cpus = 2

[[assert.serial]]
pattern = "ZEN_BOOT_OK"
description = "Compositor boots"

[[assert.exec]]
command = "pgrep zen-compositor"
exit_code = 0
description = "Compositor is running"
timeout_seconds = 5

[[assert.exec]]
command = "env DISPLAY=:0 xdpyinfo >/dev/null 2>&1"
exit_code = 0
description = "XWayland display is accessible"
timeout_seconds = 10

[[assert.serial_absent]]
pattern = "ERROR: AddressSanitizer"
description = "No ASan errors"

[[assert.serial_absent]]
pattern = "segfault"
description = "No segfaults"
