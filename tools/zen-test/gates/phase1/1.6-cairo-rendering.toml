[gate]
name = "Sub-Phase 1.6: Cairo Rendering"
phase = "1"
sub_phase = "1.6"
description = "Cairo + Pango text overlay renders visually (non-blank screenshot)"
tags = ["cairo", "pango", "rendering", "screenshot"]
timeout_seconds = 180

[vm]
ram_mb = 2048
cpus = 2

[[assert.serial]]
pattern = "ZEN_BOOT_OK"
description = "Compositor boots"

[[assert.screenshot]]
type = "non_blank"
min_size_bytes = 2048
description = "Screenshot shows rendered content (not blank)"

[[assert.serial_absent]]
pattern = "ERROR: AddressSanitizer"
description = "No ASan errors"
